# JUnit Platform Configuration for Allure Reports
# Configures Cucumber plugin to output in Allure format and JSON format

# Allure Cucumber 7 JVM Plugin and JSON reporter
cucumber.plugin=io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm, json:target/cucumber-report.json, pretty
cucumber.publish.quiet=true
# Allure results directory
allure.results.directory=target/allure-results

